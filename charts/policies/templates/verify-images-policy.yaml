apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: {{ include "policies.fullname" . }}-verify-images
  labels:
    {{- include "policies.labels" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Verify miracum image signatures and provenance attestations
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.14.0
    policies.kyverno.io/description: >-
      Verifies the cosign signature and SLSA provenance attestation of images
      built via the shared miracum standard-build.yaml workflow, regardless of
      which GitHub organization owns the source repository. The expected source
      repository is derived automatically from the image name, so this policy
      covers every current and future image published under the configured
      registries without requiring an explicit list.
spec:
  webhookConfiguration:
    timeoutSeconds: {{ .Values.webhookConfiguration.timeoutSeconds }}
  failurePolicy: {{ .Values.failurePolicy }}
  validationActions:
    {{- toYaml .Values.validationActions | nindent 4 }}
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: has-miracum-image
      expression: >-
        object.spec.containers.exists(c,
          c.image.startsWith("ghcr.io/miracum/") ||
          c.image.startsWith("ghcr.io/diz-uker/") ||
          c.image.startsWith("ghcr.io/bzkf/")
        )
  matchImageReferences:
    - glob: "ghcr.io/miracum/*:v*"
    - glob: "ghcr.io/diz-uker/*:v*"
    - glob: "ghcr.io/bzkf/*:v*"
  attestors:
    - name: buildWorkflow
      cosign:
        keyless:
          identities:
            - subjectRegExp: "^https://github\\.com/miracum/\\.github/\\.github/workflows/standard-build\\.yaml@.*$"
              issuer: "https://token.actions.githubusercontent.com"
  attestations:
    - name: provenance
      intoto:
        type: https://slsa.dev/provenance/v1
  validations:
    # Every miracum image must carry a valid keyless cosign signature
    # produced by the shared miracum build workflow.
    - expression: >-
        images.containers.all(img,
          verifyImageSignatures(img, [attestors.buildWorkflow]) > 0
        )
      message: >-
        image signature verification failed: the image must be signed via the
        miracum standard-build.yaml GitHub Actions workflow
    # Every miracum image must carry a SLSA provenance attestation signed by
    # the same build workflow (produced via actions/attest-build-provenance).
    - expression: >-
        images.containers.all(img,
          verifyAttestationSignatures(img, attestations.provenance, [attestors.buildWorkflow]) > 0
        )
      message: >-
        SLSA provenance attestation verification failed: the attestation must
        be signed by the miracum standard-build.yaml GitHub Actions workflow
    # The builder recorded in the provenance must be the trusted build
    # workflow. Redundant with the signature check above, but cheap
    # defense-in-depth against payload/signer confusion.
    #
    # extractPayload() returns the full in-toto statement (predicateType,
    # subject, predicate), not just the predicate itself, so all the
    # provenance-specific fields below are nested under `.predicate`.
    - expression: >-
        images.containers.all(img,
          extractPayload(img, attestations.provenance).predicate.runDetails.builder.id.matches("^https://github\\.com/miracum/\\.github/\\.github/workflows/standard-build\\.yaml@.*$")
        )
      message: >-
        SLSA provenance verification failed: unexpected builder id
    # The workflow entrypoint recorded in the provenance must match the
    # convention used by all miracum repositories.
    - expression: >-
        images.containers.all(img,
          extractPayload(img, attestations.provenance).predicate.buildDefinition.externalParameters.workflow.path == ".github/workflows/ci.yaml"
        )
      message: >-
        SLSA provenance verification failed: unexpected build workflow entrypoint
    # The source repository recorded in the provenance must match the image
    # name, derived automatically from the image reference - or the image may
    # live in a nested path under that source repo, since some source repos
    # are monorepos that publish multiple images (e.g.
    # ghcr.io/miracum/recruit/notify is built from github.com/miracum/recruit).
    - expression: >-
        images.containers.all(img,
          (
            image(img).repository() ==
              extractPayload(img, attestations.provenance).predicate.buildDefinition.externalParameters.workflow.repository.replace("https://github.com/", "")
            ||
            image(img).repository().startsWith(
              extractPayload(img, attestations.provenance).predicate.buildDefinition.externalParameters.workflow.repository.replace("https://github.com/", "") + "/"
            )
          )
        )
      message: >-
        SLSA provenance verification failed: the source repository recorded in
        the provenance does not match the image name
