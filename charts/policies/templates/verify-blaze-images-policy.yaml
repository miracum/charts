apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: {{ include "policies.fullname" . }}-verify-blaze-images
  labels:
    {{- include "policies.labels" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Verify blaze image signatures
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.14.0
    policies.kyverno.io/description: >-
      Verifies the cosign signature of blaze server and blaze-frontend images
      (both built from the samply/blaze repository's build.yml workflow), per
      https://github.com/samply/blaze/blob/main/docs/deployment/README.md.
spec:
  webhookConfiguration:
    timeoutSeconds: {{ .Values.webhookConfiguration.timeoutSeconds }}
  failurePolicy: {{ .Values.failurePolicy }}
  validationActions:
    {{- toYaml .Values.validationActions | nindent 4 }}
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: has-samply-image
      expression: >-
        object.spec.containers.exists(c, c.image.startsWith("ghcr.io/samply/"))
  matchImageReferences:
    - glob: "ghcr.io/samply/*"
  attestors:
    - name: blazeBuildWorkflow
      cosign:
        keyless:
          identities:
            - subjectRegExp: "^https://github\\.com/samply/blaze/.*$"
              issuer: "https://token.actions.githubusercontent.com"
  validations:
    - expression: >-
        images.containers.all(img,
          verifyImageSignatures(img, [attestors.blazeBuildWorkflow]) > 0
        )
      message: failed to verify blaze image signature
