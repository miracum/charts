apiVersion: v2
name: policies
description: A Helm chart for deploying Kyverno policies verifying images of the github.com/miracum organization.
type: application
home: https://github.com/miracum/charts
keywords:
  - kyverno
sources:
  - https://github.com/miracum/charts
maintainers:
  - name: miracum
deprecated: false
kubeVersion: ">= 1.19.0"
version: 0.2.0
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/kyverno/kyverno
  # When using the list of objects option the valid supported kinds are
  # added, changed, deprecated, removed, fixed and security.
  artifacthub.io/changes: |
    - kind: changed
      description: >-
        rewrote the chart to use Kyverno's ImageValidatingPolicy instead of a
        per-image ClusterPolicy. A single policy now verifies the SLSA
        provenance and cosign signature of all ghcr.io/miracum images by
        deriving the expected source repository from the image name, instead
        of requiring an explicit `images` list. Requires Kyverno >= 1.14 and
        the miracum/.github standard-build.yaml workflow update that switches
        to actions/attest-build-provenance. validationActions now defaults to
        Audit instead of Deny, since images built before that workflow change
        will fail the new provenance check.
    - kind: removed
      description: >-
        removed the `images` values field; ghcr.io/miracum images are now
        matched automatically via a glob pattern. Use the new `extraPolicies`
        field to add custom image verification policies for third-party
        images (e.g. the previous curl example).
