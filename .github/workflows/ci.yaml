name: Lint and Test Charts

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

# https://stackoverflow.com/a/72408109
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  chart-lint:
    name: Lint Charts
    runs-on: ubuntu-24.04
    container: ghcr.io/chgl/kube-powertools:v2.5.56@sha256:cc2e5689b7e6899c80b771a209127cce92281375bca3d06d993bb321c44c9bfa
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit # change to 'egress-policy: block' after couple of runs
          disable-sudo: true
          disable-telemetry: true

      - name: Add workspace as safe directory
        run: |
          git config --global --add safe.directory /__w/charts/charts

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if documentation is up-to-date
        run: |
          generate-docs.sh
          if git diff --exit-code HEAD; then
            echo -e "\033[0;32mDocumentation up to date\033[0m ✔"
          else
            echo -e "\033[0;31mDocumentation outdated! Please run generate-docs.sh locally and push the changes.\033[0m ❌"
            git diff --color
            exit 1
          fi

      - name: Check if changelogs were updated
        run: .github/check-chart-changelog.sh

      - name: Update dependencies
        run: find charts/ ! -path charts/ -maxdepth 1 -type d -exec helm dependency update {} \;

      - name: Run YAML lint
        run: yamllint .

      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct/ct.yaml

      - name: Run ArtifactHub lint
        run: ah lint --kind=helm

      - name: Cache kubeconform schemas
        id: cache-powerlint-kubeconform
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp
          key: ${{ runner.os }}-powerlint-kubeconform

      - name: Run Powerlint
        env:
          KUBERNETES_VERSIONS: "1.34.0 1.35.0 1.36.0"
        run: chart-powerlint.sh

      # used to test whether the changelog generation process works
      - name: Generate changelogs (test)
        run: generate-chart-changelog.sh

      # used to test whether the kubescape reports generation works
      # otherwise it is only run in the release job
      - name: Generate kubescape reports
        run: |
          kubescape scan framework AllControls --keep-local --format=html --output=kubescape-reports/allcontrols.html charts/

  test:
    name: Test Charts
    runs-on: ubuntu-24.04
    needs:
      - chart-lint
    strategy:
      matrix:
        k8s-version: [1.34.8, 1.35.5, 1.36.1]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit # change to 'egress-policy: block' after couple of runs
          disable-sudo: true
          disable-telemetry: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/ct/install.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: ${{ steps.list-changed.outputs.changed == 'true' }}
        with:
          cluster_name: kind-cluster-k8s-${{ matrix.k8s-version }}
          node_image: kindest/node:v${{ matrix.k8s-version }}

      - name: Install test fixtures chart
        if: ${{ steps.list-changed.outputs.changed == 'true' }}
        run: |
          kubectl create namespace fixtures
          # NOTE: uses "update" rather than "build" here (unlike other charts in
          # this repo) because hack/test-fixtures depends on the local
          # charts/policies chart via a file:// path with an unpinned "*"
          # version. "build" installs the exact version pinned in Chart.lock,
          # which goes stale (and fails) every time charts/policies' own
          # version changes; "update" re-resolves against the "*" constraint
          # and refreshes the lock instead.
          helm dependency update hack/test-fixtures/
          helm template \
            --namespace=fixtures \
            test-fixtures hack/test-fixtures/ > /tmp/test-fixtures.yaml

          # kubectl resolves the available API types once at the start of an
          # apply and won't pick up CRDs registered by that same invocation,
          # so custom resources (e.g. the policies chart's
          # ImageValidatingPolicy) must be applied only after their CRD is
          # already established.
          yq 'select(.kind == "CustomResourceDefinition")' /tmp/test-fixtures.yaml > /tmp/test-fixtures-crds.yaml
          kubectl apply --server-side=true -f /tmp/test-fixtures-crds.yaml
          kubectl wait --for=condition=Established --timeout=120s -f /tmp/test-fixtures-crds.yaml
          kubectl apply --server-side=true -f /tmp/test-fixtures.yaml

      - name: Run chart-testing (install)
        if: ${{steps.list-changed.outputs.changed == 'true'}}
        run: ct install --config .github/ct/install.yaml

  lint:
    uses: miracum/.github/.github/workflows/standard-lint.yaml@56f97afca6189a2fafd4e5d7cbabc6c9b83c8a85 # v1.22.4
    permissions:
      contents: read
      pull-requests: write
      issues: write
      security-events: write
      actions: read
    with:
      enable-validate-gradle-wrapper: false
      enable-codeql: false
      enable-verify-base-image-signature: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  # A single, stably-named job to point required-status-check rules at.
  # chart-lint, test, and lint aren't safe to require individually:
  # - "test" is a matrix job, so its check context name changes every time
  #   the k8s-version matrix is bumped (which renovate itself does), and its
  #   steps only run conditionally (ct list-changed), so it can legitimately
  #   report success without ever exercising anything.
  # - "lint" calls a reusable workflow, whose own jobs can add/rename check
  #   contexts independently of this file.
  # This job runs unconditionally (if: always()) even when a dependency
  # failed, and fails itself if any dependency failed or was cancelled - so
  # requiring only this job's context still fails the PR on a genuine test
  # failure, without needing to track matrix/reusable-workflow check names.
  required-checks:
    name: Required Checks
    if: always()
    needs:
      - chart-lint
      - test
      - lint
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if any required job failed or was cancelled
        env:
          CHART_LINT_RESULT: ${{ needs.chart-lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
        run: |
          echo "chart-lint: ${CHART_LINT_RESULT}"
          echo "test: ${TEST_RESULT}"
          echo "lint: ${LINT_RESULT}"
          for result in "${CHART_LINT_RESULT}" "${TEST_RESULT}" "${LINT_RESULT}"; do
            if [[ "${result}" == "failure" || "${result}" == "cancelled" ]]; then
              echo "One or more required jobs failed or were cancelled."
              exit 1
            fi
          done
